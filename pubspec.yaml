name: chatext
description: P2P IM based on Go-Waku
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.0
  ed25519_edwards: ^0.3.1
  pointycastle: ^3.7.3
  drift: ^2.14.0
  drift_sqflite: ^2.0.0
  sqflite: ^2.3.0
  path: ^1.8.0
  path_provider: ^2.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.8.1
  protobuf: ^3.1.0
  go_router: ^13.0.0
  get_it: ^7.6.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  uuid: ^4.3.3
  bs58: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  drift_dev: ^2.14.0
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  protoc_plugin: ^21.1.0
  mockito: ^5.4.4
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
